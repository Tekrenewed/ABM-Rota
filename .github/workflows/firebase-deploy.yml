name: Deploy to Firebase Hosting and Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Install Functions Dependencies
        run: cd functions && npm ci

      - name: Build Functions
        run: cd functions && npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ROTI_NAAN_WALA }}'
          channelId: live
          projectId: roti-naan-wala
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Deploy Functions to Firebase
        run: npx firebase-tools deploy --only functions --project roti-naan-wala
        env:
          FIREBASE_TOKEN: '${{ secrets.FIREBASE_TOKEN }}'
